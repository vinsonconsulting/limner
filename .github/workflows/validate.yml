name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Smoke test tools
        run: |
          python tools/pixel_art/vga_validate.py --help || true
          python tools/pixel_art/vga_normalize.py --help || true
          python tools/pixel_art/png_validate.py --help || true
          python tools/pixel_art/palette_check.py --help || true
          python tools/api/retro_diffusion.py --help || true
          python tools/inventory/asset_inventory.py --help || true
          python tools/inventory/inventory_verify.py --help || true

      - name: Validate palettes.json
        run: python -c "import json; json.load(open('tools/config/palettes.json'))"
